<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- For Bootsrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- For Sortable JS -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <link rel="stylesheet" href="../static/style.css"></link>
    
    {% block head %} {% endblock %}
    <link rel="icon" href="../static/actuallogo.png" type="image/x-icon">
    <title>{% block title %}{% endblock %}</title>
</head>
<body class="text-light" style="background-color: #121418;">
    <div class="modal fade" id="logoutmodal" tabindex="-1" >
        <div class="modal-dialog modal-lg">
            <div class="modal-content bg-dark text-white">
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="exampleLabel">Do you want to logout?</h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <form class="d-flex" role="logout" action="/logout">
                    <button type="submit" class="btn btn-danger">Logout!</button>
                </form>
            </div>
            </div>
        </div>
    </div>
    <nav class="navbar py-2 mb-4 border-bottom " style="background-color: #121418; border-color: rgba(255,255,255,0.05) !important;">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center fw-bold text-light" href="/">
                <img src="../static/actuallogo.png" width="30" height="24" class="d-inline-block me-1">
                <span><span style="color: #ffb74d;">Anime</span>-takes</span>
            </a>
            {% if session['user_id']%}
                <button class="btn btn-outline-danger px-3 rounded-2" style="--bs-btn-color: #f87171; --bs-btn-border-color: #451a1d;" type="submit" data-bs-toggle="modal" data-bs-target="#logoutmodal">Logout</button>
            {%else%}
            <div class="d-flex">
                <a href="/" class="btn btn-outline-primary px-3 rounded-2">Make your own!</a>
            </div>
            {% endif %}
        </div>
    </nav>

{% block body %} {% endblock %}
</body>
</html>
